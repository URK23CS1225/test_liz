name: Build and test 
on:
  push:
    branches: [ main ]
  pull_request: 
    branch: [ main ]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      - name: setup-python
        uses: actions/setup-python@v4
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest test_flask.py -v